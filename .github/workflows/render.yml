name: Xenia Headless Render Job

on:
  repository_dispatch:
    types: [render_job]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg rubberband-cli librubberband-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Config JSON
        run: |
          echo '${{ toJson(github.event.client_payload.payload) }}' > config.json

      - name: Decode Secrets
        run: |
          echo "${{ secrets.GCP_CLIENT_SECRETS_B64 }}" | base64 -d > client_secrets.json
          echo "${{ secrets.YT_TOKEN_B64 }}" | base64 -d > token.json

      - name: Run headless pipeline
        run: |
          python pipeline_headless.py config.json

      - name: Update YT_TOKEN_B64 secret if changed
        if: always()
        continue-on-error: true
        run: |
          if [ -f token.json ] && [ ! -z "${{ secrets.SECRET_UPDATE_PAT }}" ]; then
            echo "${{ secrets.SECRET_UPDATE_PAT }}" | gh auth login --with-token
            gh secret set YT_TOKEN_B64 --body "$(base64 -w 0 token.json)" --repo ${{ github.repository }}
            echo "✅ Rotated YouTube OAuth credentials token secret."
          fi

      - name: Upload result artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-result-${{ github.event.client_payload.payload.job_id }}
          path: |
            output/result.json
            output/*.png
            output/*.mp4
